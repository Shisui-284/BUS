# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bus_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
# Always set JWT_SECRET in environment for real deployments.
app.jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123456789012345678901234567890}
app.jwt.expiration=${JWT_EXPIRATION_MS:3600000}
app.seed.default-password=${SEED_DEFAULT_PASSWORD:ChangeMe@123}

# Logging
logging.level.com.business.busmanagement=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:4173,http://localhost:4174,http://localhost:4175,http://localhost:5173

# VNPAY Configuration (Sandbox)
# Đăng ký merchant test tại: https://sandbox.vnpayment.vn/devreg/
app.vnpay.tmn-code=${VNPAY_TMN_CODE:YOUR_TMN_CODE}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:YOUR_HASH_SECRET}
app.vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:3000/payment/return}
app.vnpay.api-url=${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}