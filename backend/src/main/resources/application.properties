# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bus_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
# Always set JWT_SECRET in environment for real deployments.
app.jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123456789012345678901234567890}
app.jwt.expiration=${JWT_EXPIRATION_MS:3600000}
app.seed.default-password=${SEED_DEFAULT_PASSWORD:ChangeMe@123}

# Logging
logging.level.com.business.busmanagement=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS Configuration
# Dev origins (localhost) + public tunneling origins used during VNPay sandbox testing
# (Cloudflare Quick Tunnel & ngrok free tier). Production deploys should set
# APP_CORS_ALLOWED_ORIGINS to a strict allowlist via env var.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4173,http://localhost:4174,http://localhost:4175,http://localhost:5173,https://*.trycloudflare.com,https://*.ngrok-free.dev,https://*.ngrok.app}

# VNPAY Configuration (Sandbox)
# Sandbox credentials để test - KHÔNG dùng cho production
# Đăng ký merchant production tại: https://vnpay.vn
app.vnpay.tmn-code=${VNPAY_TMN_CODE:SY273SZH}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:SFP53JL1Z5AS4O5WFIEBMEARJAEMDTBT}
app.vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.return-url=${VNPAY_RETURN_URL:https://clicks-statistics-billing-licenses.trycloudflare.com/payment/vnpay-return}
app.vnpay.api-url=${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
# IPN URL mà VNPay sẽ gọi server-to-server để thông báo kết quả thanh toán
# Phải là URL public, sandbox test sẽ gọi tới URL bạn đăng ký với VNPay
app.vnpay.ipn-url=${VNPAY_IPN_URL:https://machine-devoted-specially-zus.trycloudflare.com/api/public/payment/vnpay/ipn}
# Phiên bản API VNPay
app.vnpay.version=2.1.0
app.vnpay.command=pay
app.vnpay.order-type=other
app.vnpay.locale=vn
app.vnpay.currency-code=VND
# Thời gian hết hạn URL thanh toán (phút) — được dùng làm vnp_ExpireDate
app.vnpay.expire-minutes=15