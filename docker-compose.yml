version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Levuhao2005!
      MYSQL_DATABASE: bus_management_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pLevuhao2005!"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bus-backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/bus_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Levuhao2005!
      - APP_CORS_ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://localhost:3000,http://localhost:4173

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bus-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
